# ============================================================================
# Bell Path Group — Netlify configuration
# Static site, no build step. Drop-in deploy from the repository root.
# ============================================================================

[build]
  # Nothing to compile — serve the repository as-is.
  publish = "."
  command = ""

# Pretty URLs: serve /about (Netlify resolves /about/ -> about/index.html).
[build.processing.html]
  pretty_urls = true

# ----------------------------------------------------------------------------
# Security & caching headers
# ----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Long cache for immutable static assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000"

# ----------------------------------------------------------------------------
# Redirects: normalize the legacy .html path to the clean URL.
# ----------------------------------------------------------------------------
[[redirects]]
  from = "/about.html"
  to = "/about/"
  status = 301
  force = true

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301
  force = true
